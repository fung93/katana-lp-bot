name: monitor

# Near-continuous monitoring on free GitHub Actions (public repo).
# GitHub fires plain */5 schedules only ~hourly, so instead we run ONE long job
# that loops internally every 60s for ~5.5h. The */30 schedule + concurrency keep
# a fresh run queued behind the active one, so it starts the moment the old loop
# ends -> effectively continuous, with no PC and no PAT.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: monitor
  cancel-in-progress: false   # don't kill the running loop; queue the next one

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 340        # ~5h40m, under the 6h job limit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m app.monitor --loop 19800    # ~5h30m of 60s checks
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USER_ID: ${{ secrets.TELEGRAM_ALLOWED_USER_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RPC_URL: ${{ secrets.RPC_URL }}
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
