name: monitor

# Outbound-only alert check, every 5 minutes. Free on a PUBLIC repo (private
# repos cap Actions minutes). Secrets live in repo settings, never in the code.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}        # allow a manual run from the Actions tab

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m app.monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USER_ID: ${{ secrets.TELEGRAM_ALLOWED_USER_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RPC_URL: ${{ secrets.RPC_URL }}
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
